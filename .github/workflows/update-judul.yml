name: Update Judul LCS 2026 Fix

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Bagian ini adalah kunci untuk menghilangkan pesan "Node.js 20 deprecated"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # Menghilangkan warning pada step checkout
        with:
          set-safe-directory: 'true'

      - name: Proses Data Python
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # Gunakan URL Google Script Anda yang sudah di-deploy sebagai "Anyone"
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Penting: allow_redirects=True wajib untuk Google Script
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"--- LOG DEBUG ---")
              print(f"Status HTTP: {response.status_code}")
              
              # Deteksi jika Google Script mengembalikan halaman Login (HTML) bukan JSON
              if "<html" in response.text.lower():
                  print("ERROR KRITIKAL: Google Script meminta login (Akses Belum 'Anyone')")
                  sys.exit(1)

              data_json = response.json()
              
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR DARI GOOGLE: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("Data dari API kosong.")
                  sys.exit(0)
              
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"BERHASIL: {len(daftar_judul)} judul disimpan ke judul.json")

          except Exception as e:
              print(f"ERROR: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit dan Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "sync: update judul.json via node24" || echo "Tidak ada perubahan"
          git push
