name: Update Judul LCS 2026

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Ambil data dari Google Script
        run: |
          python <<EOF
          import requests
          import json
          import sys

          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              response = requests.get(url, timeout=60, allow_redirects=True)

              print("HTTP STATUS:", response.status_code)

              if "<html" in response.text.lower():
                  print("ERROR: Google Script meminta login. Pastikan akses Anyone.")
                  sys.exit(1)

              data_json = response.json()

              if isinstance(data_json, dict) and "error" in data_json:
                  print("ERROR dari Apps Script:", data_json["error"])
                  sys.exit(1)

              items = data_json.get("data", [])

              if not items:
                  print("Tidak ada data.")
                  sys.exit(0)

              daftar_judul = []

              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)

              print("Sukses menyimpan", len(daftar_judul), "judul")

          except Exception as e:
              print("ERROR:", str(e))
              sys.exit(1)
          EOF

      - name: Commit dan push jika ada perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add judul.json

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan"
          else
            git commit -m "auto update $(date)"
            git push
          fi
