name: Update Judul LCS Final Fix 2026

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Menghilangkan peringatan Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Proses Data
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # PASTE URL GOOGLE SCRIPT TERBARU ANDA DI SINI
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Google Apps Script butuh allow_redirects=True
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"DEBUG: Status Code {response.status_code}")
              
              # Cek jika yang diterima bukan JSON (tapi halaman login HTML)
              if "<html" in response.text.lower():
                  print("KESALAHAN KRITIKAL: Google Script meminta login!")
                  print("Solusi: Ubah Access di Google Deployment menjadi 'Anyone'.")
                  sys.exit(1)

              data_json = response.json()
              
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR DARI GOOGLE: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("Peringatan: Field 'data' kosong.")
                  sys.exit(1)
              
              # Susun list judul sederhana
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"SUKSES: {len(daftar_judul)} judul tersimpan.")

          except Exception as e:
              print(f"ERROR: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit Hasil
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "auto-update judul.json" || echo "Tidak ada perubahan"
          git push
