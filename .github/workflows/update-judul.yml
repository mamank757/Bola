name: Update Judul LCS 2026 Fix

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependency
        run: pip3 install requests

      - name: Eksekusi Update Data
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              response = requests.get(url, timeout=60, allow_redirects=True)

              print("=== DEBUG STATUS ===")
              print("HTTP Status:", response.status_code)

              if "<html" in response.text.lower():
                  print("ERROR: Google Script meminta login. Pastikan akses 'Anyone'.")
                  sys.exit(1)

              data_json = response.json()

              if isinstance(data_json, dict) and "error" in data_json:
                  print("ERROR dari Google:", data_json["error"])
                  sys.exit(1)

              items = data_json.get("data", [])

              if not items:
                  print("Data kosong, tidak ada update.")
                  sys.exit(0)

              daftar_judul = []

              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)

              print("SUKSES:", len(daftar_judul), "judul disimpan.")

          except Exception as e:
              print("ERROR:", str(e))
              sys.exit(1)
          EOF

      - name: Commit dan Push jika ada perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add judul.json

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "auto-update: $(date)"
            git push
          fi
