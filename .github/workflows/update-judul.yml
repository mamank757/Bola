name: Update Judul LCS via Google Proxy

on:
  schedule:
    - cron: "0 1 * * *" # Jam 8/9 Pagi WIB
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil Data API & Buat JSON
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # PASTE URL GOOGLE APPS SCRIPT ANDA DI SINI
          url = "https://script.google.com/macros/s/AKfycbynUJCPdeBbMV6Sn6R2rhloXmpVFF19h_m-MeA5k_OLjI5tEBPtH-pt4la0zmRs8K-A/exec"

          try:
              # allow_redirects=True sangat penting untuk Google Script
              response = requests.get(url, timeout=60, allow_redirects=True)
              print(f"Status HTTP: {response.status_code}")
              
              data_json = response.json()
              
              if "error" in data_json:
                  print(f"Error dari Google: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("Data kosong atau format berubah.")
                  sys.exit(1)
              
              # Proses format judul sesuai permintaan Anda
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id", "")} ({item.get("platform", "")}: {item.get("username", "")}) {item.get("title", "")}'
                  daftar_judul.append(teks)

              # Simpan ke judul.json
              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"BERHASIL: {len(daftar_judul)} judul diperbarui.")

          except Exception as e:
              print(f"Terjadi Kesalahan: {e}")
              sys.exit(1)
          EOF

      - name: Commit dan Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "sync: update judul.json via google proxy" || echo "No changes"
          git push
