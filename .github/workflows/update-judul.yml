name: Update Judul LCS 2026 Fix

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Memaksa seluruh job menggunakan mesin Node 24 untuk menghilangkan warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Eksekusi Update Data
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # URL Google Apps Script Anda (Pastikan sudah Deploy sebagai 'Anyone')
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Google Apps Script butuh allow_redirects=True agar tidak error 302
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"--- STATUS DEBUG ---")
              print(f"HTTP Status: {response.status_code}")
              
              # Cek jika Google mengirim halaman Login HTML karena akses belum 'Anyone'
              if "<html" in response.text.lower():
                  print("KESALAHAN: Google Script minta Login. Pastikan akses di-set ke 'Anyone'.")
                  sys.exit(1)

              data_json = response.json()
              
              # Jika ada pesan error dari sisi Apps Script
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR GOOGLE: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("Data kosong, tidak ada yang perlu diupdate.")
                  sys.exit(0)
              
              # Proses data judul
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"SUKSES: {len(daftar_judul)} judul tersimpan.")

          except Exception as e:
              print(f"ERROR: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit dan Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "auto-update: $(date)" || echo "No changes"
          git push
