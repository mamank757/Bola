- name: Ambil Data API & Buat JSON
        env:
          MY_COOKIE: ${{ secrets.MY_COOKIE }}
          MY_UA: ${{ secrets.MY_UA }}
          MY_REFERER: ${{ secrets.MY_REFERER }}
        run: |
          python3 <<EOF
          import requests
          import json
          import os
          import sys

          headers = {
              "User-Agent": os.getenv("MY_UA"),
              "Cookie": os.getenv("MY_COOKIE"),
              "Referer": os.getenv("MY_REFERER", "https://2025.epusluh.id/"),
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "id-ID,id;q=0.9,en-US;q=0.8,en;q=0.7",
              "Origin": "https://2025.epusluh.id",
              "Sec-Fetch-Dest": "empty",
              "Sec-Fetch-Mode": "cors",
              "Sec-Fetch-Site": "same-origin"
          }

      # Ganti dengan URL Google Apps Script Anda
          url = "https://script.google.com/macros/s/AKfycby8bNjUmE4GwKWX3JQlCowozJ-9-zvyFOFoD_9EebC1Spn10kjF8g6gOkPx_2boScUNQg/exec"

          try:
              # Google IP biasanya lolos 403, dan GitHub cuma ambil JSON bersih dari Google
              response = requests.get(url, timeout=30)
              print(f"Status HTTP dari Google: {response.status_code}")
              
              d = response.json()
              items = d.get("data", [])
              
              daftar_judul = [f'{i.get("id")} ({i.get("platform")}: {i.get("username")}) {i.get("title")}' for i in items[:10]]

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print("BERHASIL: judul.json diperbarui via Proxy Google.")
