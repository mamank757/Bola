name: Update Judul LCS 2026

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: pip install requests

      - name: Ambil data
        run: |
          python <<EOF
          import requests, json, sys

          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              r = requests.get(url, timeout=60, allow_redirects=True)
              print("HTTP:", r.status_code)

              if "<html" in r.text.lower():
                  print("ERROR: Google Script meminta login.")
                  sys.exit(1)

              data = r.json()
              items = data.get("data", [])

              if not items:
                  print("Data kosong.")
                  sys.exit(0)

              hasil = []
              for i in items:
                  teks = f'{i.get("id")} ({i.get("platform")}: {i.get("username")}) {i.get("title")}'
                  hasil.append(teks)

              with open("judul.json","w",encoding="utf-8") as f:
                  json.dump(hasil,f,indent=2,ensure_ascii=False)

              print("Berhasil:",len(hasil),"judul")

          except Exception as e:
              print("ERROR:",e)
              sys.exit(1)
          EOF

      - name: Commit jika ada perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add judul.json

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan"
          else
            git commit -m "auto update $(date)"
            git push
          fi
