- name: Ambil Data API & Buat JSON
        env:
          MY_COOKIE: ${{ secrets.MY_COOKIE }}
          MY_UA: ${{ secrets.MY_UA }}
          MY_REFERER: ${{ secrets.MY_REFERER }}
        run: |
          python3 <<EOF
          import requests
          import json
          import os
          import sys

          headers = {
              "User-Agent": os.getenv("MY_UA"),
              "Cookie": os.getenv("MY_COOKIE"),
              "Referer": os.getenv("MY_REFERER", "https://2025.epusluh.id/"),
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "id-ID,id;q=0.9,en-US;q=0.8,en;q=0.7",
              "Origin": "https://2025.epusluh.id",
              "Sec-Fetch-Dest": "empty",
              "Sec-Fetch-Mode": "cors",
              "Sec-Fetch-Site": "same-origin"
          }

          url = "https://2025.epusluh.id/api/v1/lcs?url=/lcs&page=1&per_page=10"

          try:
              response = requests.get(url, headers=headers, timeout=30)
              print(f"Status HTTP: {response.status_code}")
              
              if response.status_code == 403:
                  print("DIBLOKIR: Cloudflare menolak Cookie/UA ini. Coba ambil cookie baru saat Anda sedang aktif membuka web tersebut.")
                  sys.exit(1)

              data_json = response.json()
              items = data_json.get("data", [])
              
              daftar_judul = []
              for item in items[:10]:
                  teks = f'{item.get("id", "")} ({item.get("platform", "")}: {item.get("username", "")}) {item.get("title", "")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print("BERHASIL: judul.json diperbarui.")
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          EOF
