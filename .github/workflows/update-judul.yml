name: Update Judul LCS

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil data dari API
        run: |
          curl -L "https://2025.epusluh.id/api/v1/lcs?url=/lcs&page=1&per_page=10" -o data.json

      - name: Proses JSON
        run: |
          python3 <<EOF
import json

with open("data.json") as f:
    d=json.load(f)

judul=[]
if d.get("data"):
    for item in d["data"][:4]:
        teks=f'{item["id"]} ({item["platform"]}: {item["username"]}) {item["title"]}'
        judul.append(teks)

with open("judul.json","w") as f:
    json.dump(judul,f,indent=2)
EOF

      - name: Commit perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "update judul otomatis" || echo "tidak ada perubahan"
          git push
