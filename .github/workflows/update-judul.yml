name: Update Judul LCS 2026

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
          cd repo
          ls

      - name: Ambil data dari Google Script
        run: |
          cd repo
          python3 <<EOF
          import requests, json, sys

          url = "https://script.google.com/macros/s/AKfycbyLKAvQi2I_Ja2U7UPNuTGgzjkDqinVN0bXRlM8xm9a9SNH6dhc1fEEc3YfNsH1A6f-/exec"

          try:
              r = requests.get(url, timeout=60, allow_redirects=True)
              print("HTTP:", r.status_code)

              if "<html" in r.text.lower():
                  print("ERROR: Google Script meminta login")
                  sys.exit(1)

              data = r.json()
              items = data.get("data", [])

              if not items:
                  print("Data kosong")
                  sys.exit(0)

              hasil = []
              for i in items:
                  teks = f'{i.get("id")} ({i.get("platform")}: {i.get("username")}) {i.get("title")}'
                  hasil.append(teks)

              with open("judul.json","w",encoding="utf-8") as f:
                  json.dump(hasil,f,indent=2,ensure_ascii=False)

              print("Sukses:",len(hasil),"judul disimpan")

          except Exception as e:
              print("ERROR:",e)
              sys.exit(1)
          EOF

      - name: Commit dan push
        run: |
          cd repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add judul.json

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan"
          else
            git commit -m "auto update $(date)"
            git push
          fi
