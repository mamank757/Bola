name: Update Judul LCS Final Fix

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Bagian ini untuk menghilangkan peringatan Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil Data via Google Proxy
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # PASTE URL GOOGLE APPS SCRIPT ANDA DI SINI
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Penting: allow_redirects harus True untuk Google Script
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"DEBUG: HTTP Status {response.status_code}")
              
              # Cek apakah response kosong
              if not response.text.strip():
                  print("ERROR: Response dari Google kosong!")
                  sys.exit(1)

              data_json = response.json()
              
              # Jika Google mengirim pesan error
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR dari Google Script: {data_json['error']}")
                  sys.exit(1)

              # Ambil data dari JSON epusluh
              items = data_json.get("data", [])
              if not items:
                  print("DEBUG: Data JSON yang diterima:")
                  print(json.dumps(data_json)[:500])
                  print("ERROR: Field 'data' tidak ditemukan atau kosong.")
                  sys.exit(1)
              
              # Susun list judul
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"BERHASIL: {len(daftar_judul)} judul disimpan.")

          except Exception as e:
              print(f"CRITICAL ERROR: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit dan Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "sync: update judul.json $(date)" || echo "No changes"
          git push
