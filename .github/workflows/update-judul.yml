name: Update Judul LCS 2026

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # SOLUSI: Memaksa runner menggunakan Node 24 untuk menghilangkan warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Tambahan agar git tidak komplain tentang izin direktori
          set-safe-directory: 'true'

      - name: Ambil Data via Google Proxy
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # URL Google Apps Script Anda (Pastikan sudah dideploy sebagai 'Anyone')
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Penting: allow_redirects=True karena Google Script selalu melakukan pengalihan link
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"--- INFO DEBUG ---")
              print(f"HTTP Status: {response.status_code}")
              
              # Deteksi jika Google Script mengembalikan halaman Login (HTML) alih-alih JSON
              if "<html" in response.text.lower():
                  print("KESALAHAN: Google Script Anda masih dalam mode privat (Minta Login).")
                  print("SOLUSI: Di Google Script, Deploy > Manage > Edit > Who has access: Anyone.")
                  sys.exit(1)

              data_json = response.json()
              
              # Cek jika ada pesan error dari sisi Google Apps Script
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR GOOGLE: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("Pesan: Data tidak ditemukan atau kosong.")
                  sys.exit(0)
              
              # Ambil 10 judul terbaru
              daftar_judul = []
              for item in items[:10]:
                  id_lcs = item.get("id", "")
                  platform = item.get("platform", "")
                  username = item.get("username", "")
                  title = item.get("title", "")
                  daftar_judul.append(f"{id_lcs} ({platform}: {username}) {title}")

              # Tulis ke file judul.json
              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"SUKSES: {len(daftar_judul)} judul tersimpan.")

          except Exception as e:
              print(f"GAGAL: {str(e)}")
              sys.exit(1)
          EOF

      - name: Simpan Perubahan ke Repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "sync: update judul.json $(date)" || echo "No changes"
          git push
