name: Update Judul LCS

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil data API
        run: |
          curl -s "https://2025.epusluh.id/api/v1/lcs?url=/lcs&page=1&per_page=10" > data.json

      - name: Ambil 4 judul
        run: |
          cat data.json | jq '.data[0:4] | map("\(.id) (\(.platform): \(.username)) \(.title)")' > judul.json

      - name: Commit update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "update judul otomatis" || echo "tidak ada perubahan"
          git push
