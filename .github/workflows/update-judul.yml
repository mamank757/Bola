name: Update Judul LCS Final Fix

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Menempatkan env di sini untuk memastikan Node.js 24 aktif di seluruh langkah
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Proses Data Python
        run: |
          python3 <<EOF
          import requests
          import json
          import sys

          # URL Google Apps Script Anda
          url = "https://script.google.com/macros/s/AKfycbzBTFZkf7n49aTdJ_7PdhnxL-c2uUF8PrqKxbOuUJKgfSERlJL7RpNUlbrRQKDt6ktf/exec"

          try:
              # Menambahkan stream=True untuk menangani data besar jika perlu
              response = requests.get(url, timeout=60, allow_redirects=True)
              
              print(f"--- DEBUG INFO ---")
              print(f"HTTP Status: {response.status_code}")
              
              # Deteksi jika yang diterima adalah halaman login Google (HTML)
              if "<html" in response.text.lower():
                  print("KESALAHAN: Link Google Script meminta LOGIN!")
                  print("SOLUSI: Di Google Script, klik Deploy > Manage > Edit > Who has access: 'Anyone'")
                  sys.exit(1)

              data_json = response.json()
              
              # Cek jika ada pesan error dari Google Apps Script
              if isinstance(data_json, dict) and "error" in data_json:
                  print(f"ERROR GOOGLE SCRIPT: {data_json['error']}")
                  sys.exit(1)

              items = data_json.get("data", [])
              if not items:
                  print("PERINGATAN: Data kosong dari API.")
                  # Jangan exit 1 agar tidak merah jika memang data sedang kosong
                  sys.exit(0) 
              
              daftar_judul = []
              for item in items:
                  teks = f'{item.get("id")} ({item.get("platform")}: {item.get("username")}) {item.get("title")}'
                  daftar_judul.append(teks)

              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print(f"SUKSES: {len(daftar_judul)} judul tersimpan.")

          except Exception as e:
              print(f"ERROR: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit Hasil
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "auto-update judul.json" || echo "No changes"
          git push
