name: Update Judul LCS Otomatis

on:
  schedule:
    - cron: "0 1 * * *" # Berjalan tiap jam 8 atau 9 pagi WIB
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil Data API & Buat JSON
        env:
          MY_COOKIE: ${{ secrets.MY_COOKIE }}
          MY_UA: ${{ secrets.MY_UA }}
        run: |
          python3 <<EOF
          import requests
          import json
          import os

          cookie = os.getenv("MY_COOKIE", "")
          ua = os.getenv("MY_UA", "Mozilla/5.0")
          url = "https://2025.epusluh.id/api/v1/lcs?url=/lcs&page=1&per_page=10"
          
          headers = {
              "User-Agent": ua,
              "Cookie": cookie,
              "Accept": "application/json"
          }

          try:
              response = requests.get(url, headers=headers, timeout=30)
              print(f"Status HTTP: {response.status_code}")
              
              if response.status_code != 200:
                  print("Gagal mengambil data. Cek Cookie di Secrets!")
                  exit(1)

              d = response.json()
              items = d.get("data", [])
              
              # Ambil teks judul saja untuk dimasukkan ke array
              daftar_judul = []
              for item in items[:10]: # Ambil 10 data terbaru
                  teks = f'{item.get("id", "")} ({item.get("platform", "")}: {item.get("username", "")}) {item.get("title", "")}'
                  daftar_judul.append(teks)

              # Tulis ke judul.json
              with open("judul.json", "w", encoding="utf-8") as f:
                  json.dump(daftar_judul, f, indent=2, ensure_ascii=False)
              
              print("File judul.json berhasil diperbarui!")

          except Exception as e:
              print(f"Terjadi Kesalahan: {e}")
              exit(1)
          EOF

      - name: Commit dan Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "sync: update judul.json via API" || echo "No changes"
          git push
