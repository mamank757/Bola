name: Update Judul LCS

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Ambil halaman LCS
        run: |
          curl -s https://dev.epusluh.id/lcs/list > page.html

      - name: Ambil judul konten
        run: |
          grep -oP '[0-9]{3}.*' page.html | head -4 > judul.txt

      - name: Ubah ke JSON
        run: |
          echo "[" > judul.json
          sed 's/^/"/;s/$/",/' judul.txt >> judul.json
          sed -i '$ s/,$//' judul.json
          echo "]" >> judul.json

      - name: Commit perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "update judul otomatis" || echo "tidak ada perubahan"
          git push
