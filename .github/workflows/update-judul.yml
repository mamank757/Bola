name: Update Judul LCS

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ambil data dari API
        # Menambahkan header User-Agent agar tidak diblokir server
        run: |
          curl -H "User-Agent: Mozilla/5.0" -L "https://2025.epusluh.id/api/v1/lcs?url=/lcs&page=1&per_page=10" -o data.json

      - name: Proses JSON dan Update HTML
        run: |
          python3 <<EOF
          import json
          import re

          # 1. Load Data
          try:
              with open("data.json") as f:
                  d = json.load(f)
          except Exception:
              d = {}

          # 2. Ambil Judul
          items = d.get("data", [])
          judul_html = ""
          for item in items[:4]:
              teks = f'{item.get("id", "")} ({item.get("platform", "")}: {item.get("username", "")}) {item.get("title", "")}'
              judul_html += f"<p>{teks}</p>\n"

          if not judul_html:
              judul_html = "<p>Data tidak ditemukan</p>"

          # 3. Inject ke index.html
          try:
              with open("index.html", "r") as f:
                  html = f.read()
              
              pattern = r".*?"
              replacement = f"\n{judul_html}\n"
              new_html = re.sub(pattern, replacement, html, flags=re.DOTALL)
              
              with open("index.html", "w") as f:
                  f.write(new_html)
          except FileNotFoundError:
              print("File index.html tidak ditemukan, melewati proses update HTML.")
          EOF

      - name: Commit perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "update judul otomatis: $(date)" || echo "tidak ada perubahan"
          git push
