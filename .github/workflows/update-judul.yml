name: Update Judul LCS

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ambil judul dari ePusluh
        run: |
          pip install requests
          python <<EOF
import requests
import json
import re

url = "https://dev.epusluh.id/lcs/list"

r = requests.get(url)
html = r.text

# cari judul yang dimulai angka
matches = re.findall(r'\d{3}\s*\([^)]+\)\s*[^<]+', html)

judul = matches[:4]

with open("judul.json","w") as f:
    json.dump(judul,f,indent=2)

print("Judul ditemukan:", judul)
EOF

      - name: Commit perubahan
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add judul.json
          git commit -m "update judul otomatis" || echo "tidak ada perubahan"
          git push
