<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu BPP Bola</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#f1f5f4;
margin:0;
}

/* HEADER */

header{
background:#1B5E20;
color:white;
text-align:center;
padding:20px;
font-size:20px;
font-weight:bold;
}

/* GRID MENU */

.menu-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;

}

/* ITEM MENU */

.menu-item{

background:white;
border-radius:15px;
padding:25px 10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:all 0.3s ease;
cursor:pointer;

}

/* ANIMASI */

.menu-item:hover{

transform:translateY(-8px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

/* IKON */

.menu-item i{

font-size:35px;
color:#2e7d32;
margin-bottom:10px;

}

/* TEKS */

.menu-item p{

margin:0;
font-weight:bold;
font-size:14px;

}

/* RESPONSIVE HP */

@media(max-width:600px){

.menu-item{

padding:20px 5px;

}

.menu-item i{

font-size:30px;

}

}

</style>

</head>

<body>

<header>

BPP Bola Kabupaten Wajo

</header>

<div class="menu-grid">

<div class="menu-item">
<i class="fa-solid fa-user"></i>
<p>Profil</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-newspaper"></i>
<p>Berita</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-circle-info"></i>
<p>Informasi</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-cloud-sun"></i>
<p>Prediksi Musim</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-book"></i>
<p>Materi</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-file"></i>
<p>Eviden LCS</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-screwdriver-wrench"></i>
<p>Tools Laporan</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-database"></i>
<p>Data Monografi</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-people-group"></i>
<p>Kegiatan Penyuluh</p>
</div>

</div>

</body>
</html>
